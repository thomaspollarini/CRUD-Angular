<div class="header">
  <div class="header-side">
    <p-button
      icon="pi pi-bars"
      (onClick)="menuVisivel = true"
      [text]="true"
      styleClass="btn-menu-white text-xl"
    >
    </p-button>
  </div>

  <div class="header-title">CRUD Angular</div>

  <div class="header-side"></div>
</div>

<p-drawer [(visible)]="menuVisivel">
  <div class="nav-container">
    <p-button
      label="Inicio"
      icon="pi pi-home"
      [text]="true"
      styleClass="nav-button"
      routerLink="/"
      (click)="menuVisivel = false"
    >
    </p-button>

    <p-button
      label="Clientes"
      icon="pi pi-users"
      [text]="true"
      styleClass="nav-button"
      routerLink="/customers"
      (click)="menuVisivel = false"
    >
    </p-button>

    <p-button
      label="Fornecedores"
      icon="pi pi-truck"
      [text]="true"
      styleClass="nav-button"
      routerLink="/suppliers"
      (click)="menuVisivel = false"
    >
    </p-button>

    <p-button
      label="Produtos"
      icon="pi pi-box"
      [text]="true"
      styleClass="nav-button"
      routerLink="/products"
      (click)="menuVisivel = false"
    >
    </p-button>
  </div>
</p-drawer>
